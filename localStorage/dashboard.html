<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #1295cda6;
      }

      #logged {
        margin-bottom: 10px;
        color: #0b878e;
      }

      button {
        width: 100px;
        padding: 12px;
        border-radius: 6px;
        border: none;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        background-color: #e74a3b;
        color: white;
        transition: 0.3s;
      }

      button:hover {
        background-color: #c0392b;
      }
    </style>
  </head>
  <body>
    <main id="dashboard">
      
        <h2 id="logged">DASHBOARD</h2>

        <h3 id="welcomeUser"></h3>
        <p id="loginTime"></p>
        <button id="logoutBtn" type="button">Logout</button><br>
        <button id="btn" type="button">Delete Account</button>


        
<p id="dateTime"></p>
    </main>
    <script src="localStorage.js"></script>
  </body>
</html>
